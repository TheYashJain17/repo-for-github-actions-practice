name: Reusable Workflow 
on: 
  workflow_call: 
    inputs:
      name:
        description: Enter The Name 
        required: true
        type: string

jobs:
    greeting:
      runs-on: ubuntu-latest
      steps:
        - name: Greeting Step
          run: echo "Hy ${{ inputs.name }} , You are inside the reusable workflow"