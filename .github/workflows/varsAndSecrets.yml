name: Vars And Secrets
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Step 
        run: echo "I am ${{vars.TEST_VAR}} King Of Hell" #by ${{vars.TEST_VAR}} we are accessing the global variable we added in our repository, follow this exact syntax to get the value of the variable

  test2:
    runs-on: ubuntu-latest
    steps:
      - name: Test2 Step 
        run: echo "This is my Password ${{secrets.TEST_SECRET}}" #by ${{secrets.TEST_SECRET}} we are accessing the secret variable we added in our repository, follow this exact syntax to get the value of the secret , it wont show when we try to print , we will get the mask form which is **** but when we try to use it internally it will work as it should
         